<!doctype html>
<!--
  Ask Amma - full-page wrapper.
  Host this on your site (e.g. neevalay.com/ask-amma.html) for a dedicated
  "Ask Amma" page you can link from the menu. It fills the window with the
  assistant, with your own title + favicon (no Streamlit chrome shows through).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ask Amma · Neevalay Tots</title>
  <meta name="description" content="Ask Amma about Neevalay Tots - programmes, approach, admissions and daily care.">
  <!-- neevalay.com/favicon.ico does not exist (404) and gave a blank globe in the tab.
       Point at the real site icon instead. -->
  <link rel="icon" type="image/png" href="https://neevalay.com/wp-content/uploads/2026/07/neevalay-site-icon-300x300.png">
  <style>
    html, body { margin: 0; height: 100%; background: #F8F9F5; }
    #neevu-full { border: 0; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <iframe id="neevu-full" title="Ask Neevalay"
          src="https://ask-neevalay.streamlit.app/?mini"
          allow="clipboard-write"></iframe>
</body>
</html>
