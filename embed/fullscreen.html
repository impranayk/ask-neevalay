<!doctype html>
<!--
  Ask Neevalay — full-page wrapper.
  Host this on your site (e.g. neevalay.com/ask-neevu.html) for a dedicated

-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ask Neevalay · Neevalay Tots</title>
  <meta name="description" content="Ask Neevu about Neevalay Tots — programmes, approach, admissions and daily care.">
  <link rel="icon" href="https://neevalay.com/favicon.ico">
  <style>
    html, body { margin: 0; height: 100%; background: #F8F9F5; }
    #neevu-full { border: 0; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <iframe id="neevu-full" title="Ask Neevalay"
          src="https://ask-neevalay.streamlit.app/?mini"
          allow="clipboard-write"></iframe>
</body>
</html>
