name: Refresh knowledge index

# Re-crawl neevalay.com nightly so the assistant stays in sync with the website.
# No secrets needed — it only reads the public site and embeds locally (CPU).
on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Re-crawl site and rebuild the index
        run: python ingest/build_index.py

      - name: Commit the refreshed index if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/knowledge.npz data/chunks.json
          if git diff --cached --quiet; then
            echo "No content changes — nothing to commit."
          else
            git commit -m "chore: nightly knowledge index refresh"
            git push
          fi
